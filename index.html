      .border-natura-300 { border-color: #2ECC40 !important; }
      .border-cielo-200  { border-color: #66DDFF !important; }
      .border-warm-200   { border-color: #ECEAE4 !important; }
      .border-warm-400   { border-color: #B5AFA5 !important; }
      .border-warm-800   { border-color: #262420 !important; }
      .border-stone-100  { border-color: #F5F5F0 !important; }
      .border-stone-200  { border-color: #ECEAE4 !important; }
      .border-stone-300  { border-color: #DDD9D0 !important; }
      .border-stone-700  { border-color: #3D3A34 !important; }
      .border-amber-500  { border-color: #00D084 !important; }
      .border-green-500  { border-color: #00D084 !important; }
      .border-t-ambra-500 { border-top-color: #00B870 !important; }

      .hover\:border-ambra-300:hover { border-color: #2ECC40 !important; }
      .hover\:border-ambra-400:hover { border-color: #00D084 !important; }
      .hover\:border-natura-300:hover { border-color: #2ECC40 !important; }
      .hover\:border-stone-300:hover  { border-color: #DDD9D0 !important; }
      .hover\:border-warm-400:hover   { border-color: #B5AFA5 !important; }

      .group-hover\:border-ambra-200:is(:where(.group):hover *) { border-color: #80FFBF !important; }

      /* ── Focus/ring colors ───────────────────────────────── */
      .focus\:border-ambra-400:focus  { border-color: #00D084 !important; }
      .focus\:border-cielo-400:focus  { border-color: #29ABE2 !important; }
      .focus\:border-energia-400:focus { border-color: #E8FF00 !important; }
      .focus\:border-natura-400:focus  { border-color: #00D084 !important; }
      .focus\:ring-ambra-400:focus  { --tw-ring-color: #00D084 !important; }
      .focus\:ring-ambra-500:focus  { --tw-ring-color: #00B870 !important; }
      .focus\:ring-cielo-400:focus  { --tw-ring-color: #29ABE2 !important; }
      .focus\:ring-energia-400:focus { --tw-ring-color: #E8FF00 !important; }
      .focus\:ring-natura-400:focus  { --tw-ring-color: #00D084 !important; }
      .focus-within\:outline-ambra-500:focus-within { outline-color: #00B870 !important; }
      .focus-visible\:outline-ambra-500:focus-visible { outline-color: #00B870 !important; }

      /* ── Active states ───────────────────────────────────── */
      .active\:bg-ambra-100:active { background-color: #B3FFD9 !important; }
      .active\:bg-ambra-800:active { background-color: #006840 !important; }
      .active\:bg-natura-700:active { background-color: #008550 !important; }

      /* ── Gradient overrides ──────────────────────────────── */
      .from-ambra-50  { --tw-gradient-from: #E6FFF2 !important; }
      .from-ambra-700 { --tw-gradient-from: #008550 !important; }
      .from-natura-800 { --tw-gradient-from: #006840 !important; }
      .from-cielo-50\/40 { --tw-gradient-from: rgba(230,249,255,.4) !important; }
      .from-warm-900 { --tw-gradient-from: #1A1A2E !important; }

      .to-ambra-600 { --tw-gradient-to: #00A05E !important; }
      .to-natura-50  { --tw-gradient-to: #E6FFF2 !important; }
      .to-natura-600 { --tw-gradient-to: #00A05E !important; }
      .to-warm-50    { --tw-gradient-to: #FAFAF8 !important; }
      .to-warm-700   { --tw-gradient-to: #3D3A34 !important; }

      /* ── Compiled glassmorphism overrides ─────────────────── */
      .glass-ambra {
        background: rgba(0,208,132,.10) !important;
        -webkit-backdrop-filter: blur(16px) saturate(180%) !important;
        backdrop-filter: blur(16px) saturate(180%) !important;
      }
      .glass-ambra:hover {
        background: rgba(0,208,132,.20) !important;
        box-shadow: 0 0 24px rgba(0,208,132,.4), 0 12px 48px rgba(0,0,0,.18) !important;
      }
      .glass-natura {
        background: rgba(0,208,132,.10) !important;
        -webkit-backdrop-filter: blur(16px) saturate(180%) !important;
        backdrop-filter: blur(16px) saturate(180%) !important;
      }
      .glass-natura:hover {
        background: rgba(0,208,132,.20) !important;
        box-shadow: 0 0 24px rgba(0,208,132,.4), 0 12px 48px rgba(0,0,0,.18) !important;
      }
      .glass-cielo {
        background: rgba(0,180,216,.10) !important;
        -webkit-backdrop-filter: blur(16px) saturate(180%) !important;
        backdrop-filter: blur(16px) saturate(180%) !important;
      }
      .glass-cielo:hover {
        background: rgba(0,180,216,.20) !important;
        box-shadow: 0 0 24px rgba(0,180,216,.4), 0 12px 48px rgba(0,0,0,.18) !important;
      }
      .glass-energia {
        background: rgba(232,255,0,.08) !important;
        -webkit-backdrop-filter: blur(16px) saturate(200%) !important;
        backdrop-filter: blur(16px) saturate(200%) !important;
      }

      /* ── Compiled gradient overrides ──────────────────────── */
      .gradient-hero {
        background: linear-gradient(135deg, #00D084, #00B4D8, #F0FF00) !important;
        background-size: 200% 200% !important;
        animation: gradient-shift 12s ease infinite !important;
      }
      .gradient-natura {
        background: linear-gradient(120deg, #00D084, #2ECC40) !important;
        background-size: 200% 200% !important;
        animation: gradient-shift 12s ease infinite !important;
      }
      .gradient-energia {
        background: linear-gradient(45deg, #E8FF00, #F0FF00, #00D084) !important;
        background-size: 200% 200% !important;
        animation: gradient-shift 12s ease infinite !important;
      }

      /* ── Placeholder colors ──────────────────────────────── */
      .placeholder\:text-stone-400::placeholder { color: #B5AFA5 !important; }
      .placeholder\:text-warm-500::placeholder  { color: #8A847A !important; }

      /* ── Ring colors ─────────────────────────────────────── */
      .ring-ambra-300\/50 { --tw-ring-color: rgba(46,204,64,.5) !important; }

      /* ── Warm/stone bg fills ─────────────────────────────── */
      .bg-warm-50  { background-color: #FAFAF8 !important; }
      .bg-warm-100 { background-color: #F5F5F0 !important; }
      .bg-warm-200 { background-color: #ECEAE4 !important; }
      .bg-warm-300 { background-color: #DDD9D0 !important; }
      .bg-warm-400 { background-color: #B5AFA5 !important; }
      .bg-warm-800 { background-color: #262420 !important; }
      .bg-warm-900 { background-color: #1A1A2E !important; }
      .bg-stone-200 { background-color: #ECEAE4 !important; }
      .bg-stone-300 { background-color: #DDD9D0 !important; }
      .bg-stone-700 { background-color: #3D3A34 !important; }
      .bg-stone-800 { background-color: #262420 !important; }

      .bg-amber-50  { background-color: #E6FFF2 !important; }
      .bg-amber-100 { background-color: #B3FFD9 !important; }
      .bg-amber-500 { background-color: #00D084 !important; }
      .bg-green-50  { background-color: #E6FFF2 !important; }
      .bg-green-100 { background-color: #B3FFD9 !important; }
      .bg-green-500 { background-color: #00D084 !important; }
      .bg-blue-50   { background-color: #E6F9FF !important; }
      .bg-blue-100  { background-color: #B3EEFF !important; }
      .bg-red-50    { background-color: #FFF1F1 !important; }
      .bg-red-100   { background-color: #FFE0E0 !important; }

      /* ══════════════════════════════════════════════════════════════════
         SEZIONE K — BUTTON SYSTEM OVERRIDE
         ══════════════════════════════════════════════════════════════════ */
      /* Qualunque button con bg verde / natura / brand */
      button[class*="bg-natura"],
      button[class*="bg-green"],
      a[class*="bg-natura"],
      a[class*="bg-green"],
      [class*="cta-primary"],
      .btn-primary {
        background: var(--grad-brand) !important;
        background-size: 200% 200% !important;
        animation: gradient-shift 5s ease-in-out infinite !important;
        color: #fff !important;
        border-radius: var(--r-full) !important;
        font-weight: 600 !important;
        box-shadow: var(--shadow-green) !important;
        transition: transform .25s var(--ease-spring), box-shadow .25s !important;
        position: relative;
        overflow: hidden;
      }
      button[class*="bg-natura"]:hover,
      button[class*="bg-green"]:hover,
      a[class*="bg-natura"]:hover,
      a[class*="bg-green"]:hover {
        transform: translateY(-2px) scale(1.02) !important;
        box-shadow: var(--shadow-neon) !important;
      }

      /* CTA con shimmer */
      button[class*="bg-natura"]::after,
      button[class*="bg-green"]::after,
      a[class*="bg-natura"]::after,
      a[class*="bg-green"]::after {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.2) 50%, transparent 100%);
        background-size: 200% 100%;
        animation: shimmer 2.5s ease-in-out infinite;
        pointer-events: none;
      }

      /* Pulsanti ambra → Verde brand (principale) */
      button[class*="bg-ambra"],
      a[class*="bg-ambra"] {
        background: linear-gradient(135deg, #00D084, #00B4D8) !important;
        color: #fff !important;
        border-radius: var(--r-full) !important;
        box-shadow: 0 6px 20px rgba(0,208,132,.3) !important;
        transition: transform .25s var(--ease-spring), box-shadow .25s !important;
        position: relative;
        overflow: hidden;
      }
      button[class*="bg-ambra"]:hover,
      a[class*="bg-ambra"]:hover {
        transform: translateY(-2px) scale(1.02) !important;
        box-shadow: 0 0 24px rgba(0,208,132,.5), 0 8px 30px rgba(0,208,132,.3) !important;
      }
      /* Shimmer su pulsanti ambra */
      button[class*="bg-ambra"]::after,
      a[class*="bg-ambra"]::after {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.2) 50%, transparent 100%);
        background-size: 200% 100%;
        animation: shimmer 2.5s ease-in-out infinite;
        pointer-events: none;
      }

      /* Pulsanti cielo */
      button[class*="bg-cielo"],
      a[class*="bg-cielo"] {
        background: linear-gradient(135deg, #00B4D8, #29ABE2) !important;
        color: #fff !important;
        border-radius: var(--r-full) !important;
        box-shadow: 0 6px 20px rgba(0,180,216,.3) !important;
        transition: transform .25s var(--ease-spring), box-shadow .25s !important;
      }
      button[class*="bg-cielo"]:hover,
      a[class*="bg-cielo"]:hover {
        transform: translateY(-2px) scale(1.02) !important;
        box-shadow: 0 0 24px rgba(0,180,216,.5), 0 8px 30px rgba(0,180,216,.3) !important;
      }

      /* ══════════════════════════════════════════════════════════════════
         SEZIONE L — CARD SYSTEM
         ══════════════════════════════════════════════════════════════════ */
      .card:not(.leaflet-container):not(.leaflet-popup-content-wrapper),
      [class*="rounded-2xl"]:not(button):not(a):not(input):not(.leaflet-container),
      [class*="rounded-xl"]:not(button):not(a):not(input):not(.leaflet-container) {
        border-radius: var(--r-xl) !important;
        transition: transform .35s var(--ease-spring),
                    box-shadow .35s var(--ease-out) !important;
      }
      .card:not(.leaflet-container):hover,
      [class*="rounded-2xl"]:not(button):not(a):not(input):not(.leaflet-container):hover {
        transform: translateY(-6px) !important;
        box-shadow: var(--shadow-xl), 0 0 0 1px rgba(0,208,132,.12) !important;
      }

      /* ══════════════════════════════════════════════════════════════════
         SEZIONE M — NAVBAR / HEADER
         ══════════════════════════════════════════════════════════════════ */
      header, nav, [class*="navbar"], [class*="header"],
      [class*="nav-"], [class*="fixed"][class*="top-0"] {
        backdrop-filter: blur(20px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(20px) saturate(180%) !important;
        border-bottom: 1px solid rgba(255,255,255,.15) !important;
        transition: background .35s, box-shadow .35s, backdrop-filter .35s !important;
      }

      /* ══════════════════════════════════════════════════════════════════
         SEZIONE N — FOOTER
         ══════════════════════════════════════════════════════════════════ */
      footer, .footer {
        background: var(--grad-notte) !important;
        color: rgba(255,255,255,.8) !important;
        position: relative;
        overflow: hidden;
      }
      footer::before, .footer::before {
        content: '';
        position: absolute; inset: 0;
        background: var(--grad-logo-swirl);
        opacity: .04;
        animation: spin-slow 60s linear infinite;
        pointer-events: none;
        border-radius: 50%;
        width: 200%; height: 200%;
        top: -50%; left: -50%;
      }

      /* ══════════════════════════════════════════════════════════════════
         SEZIONE O — HERO / MEDIA
         ══════════════════════════════════════════════════════════════════ */
      [class*="overflow-hidden"]:not(.leaflet-container):not(.leaflet-pane):not([class*="leaflet"]) img:not(.leaflet-tile):not(.leaflet-marker-icon):not(.leaflet-marker-shadow) {
        transition: transform .8s var(--ease-out) !important;
      }
      [class*="overflow-hidden"]:not(.leaflet-container):not([class*="leaflet"]):hover img:not(.leaflet-tile):not(.leaflet-marker-icon) {
        transform: scale(1.06) !important;
      }

      /* ══════════════════════════════════════════════════════════════════
         SEZIONE P — LEAFLET MAP PROTECTION
         Le mappe NON devono essere alterate: nessun transform, nessun
         border-radius eccessivo, nessun filter sui tile.
         ══════════════════════════════════════════════════════════════════ */
      /* Impedisci che i selettori broad intercettino i componenti Leaflet */
      .leaflet-container,
      .leaflet-container *,
      .leaflet-pane,
      .leaflet-tile-pane,
      .leaflet-tile,
      .leaflet-tile-container,
      .leaflet-zoom-animated,
      .leaflet-marker-pane,
      .leaflet-shadow-pane,
      .leaflet-overlay-pane,
      .leaflet-control-container,
      .leaflet-top,
      .leaflet-bottom {
        animation: none !important;
        transition: none !important;
        opacity: 1 !important;
        visibility: visible !important;
        pointer-events: auto !important;
        /* NOTA: NON sovrascrivere transform — Leaflet usa transform inline
           per posizionare tile, marker e layer. transform:none li rompe. */
      }
      /* Nessun hover effect sulle immagini tile */
      .leaflet-container img,
      .leaflet-tile-pane img,
      .leaflet-tile {
        filter: none !important;
        transition: none !important;
        border-radius: 0 !important;
        /* NOTA: NON forzare transform:none — i tile usano transform per il posizionamento */
      }
      /* Impedisci hover scale/translate su tile e marker */
      .leaflet-container img:hover,
      .leaflet-tile:hover {
        filter: none !important;
      }
      /* Il container mappa mantiene solo angoli arrotondati leggeri */
      .leaflet-container {
        border-radius: 12px;
        z-index: var(--z-card) !important;
        position: relative !important;
        isolation: isolate;
      }
      /* Previeni che regole broad (card hover, overflow-hidden) alterino la mappa */
      .leaflet-container:hover,
      .leaflet-container *:hover {
        transform: unset;
      }
      /* Popup mappa: solo estetica, nessun effetto pesante */
      .leaflet-popup-content-wrapper {
        border-radius: var(--r-lg);
        box-shadow: var(--shadow-lg);
      }
      .leaflet-popup-tip { background: #fff; }
      /* Assicura che il container mappa non sia coperto da orbs/swirl */
      .leaflet-pane { z-index: 400 !important; }
      .leaflet-top, .leaflet-bottom { z-index: 500 !important; }
      .leaflet-popup-pane { z-index: 700 !important; }
      .leaflet-control-zoom a {
        background: #fff !important;
        color: #1A1A2E !important;
        border: 1px solid #ECEAE4 !important;
      }

      /* ══════════════════════════════════════════════════════════════════
         SEZIONE Q — FOCUS & A11Y
         ══════════════════════════════════════════════════════════════════ */
      *:focus-visible {
        outline: 3px solid var(--mb-green) !important;
        outline-offset: 3px !important;
        border-radius: var(--r-sm) !important;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px;
        padding: 0; margin: -1px; overflow: hidden;
        clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }

      /* ══════════════════════════════════════════════════════════════════
         SEZIONE S — NOISE TEXTURE
         ══════════════════════════════════════════════════════════════════ */
      body::before {
        content: '';
        position: fixed; inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
        pointer-events: none;
        opacity: .03;
        z-index: -1;
      }

      /* ══════════════════════════════════════════════════════════════════
         SEZIONE T — LOADING SCREEN
         ══════════════════════════════════════════════════════════════════ */
      #mb-loader {
        position: fixed; inset: 0;
        background: var(--grad-notte);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: calc(var(--z-cursor) - 1);
        transition: opacity .6s var(--ease-in-out), visibility .6s;
      }
      #mb-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      #mb-loader .loader-logo {
        font-family: var(--font-display) !important;
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 700;
        background: var(--grad-text-hero);
        background-size: 300% 100%;
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: morph-colors 3s ease infinite;
        margin-bottom: .5rem;
      }
      #mb-loader .loader-sub {
        font-family: var(--font-body) !important;
        font-size: .75rem; letter-spacing: .2em;
        text-transform: uppercase;
        color: rgba(255,255,255,.5);
        margin-bottom: 2.5rem;
      }
      #mb-loader .loader-swirl {
        width: 60px; height: 60px;
        border-radius: 50%;
        animation: spin-slow 2s linear infinite;
        filter: drop-shadow(0 0 12px rgba(46,204,64,.5)) drop-shadow(0 0 40px rgba(46,204,64,.2));
        opacity: .9;
      }
      #mb-loader .loader-swirl img {
        width: 100%; height: 100%;
        object-fit: contain;
        border-radius: 50%;
      }
      #mb-loader .loader-ring {
        position: absolute;
        width: 80px; height: 80px;
        border: 2px solid rgba(0,208,132,.4);
        border-radius: 50%;
        animation: pulse-ring 1.8s ease-out infinite;
      }
      #mb-loader .loader-ring:nth-child(2) { animation-delay: .6s; }
      #mb-loader .loader-ring:nth-child(3) { animation-delay: 1.2s; }

      /* ══════════════════════════════════════════════════════════════════
         SEZIONE V — INNTOUR DOTS
         ══════════════════════════════════════════════════════════════════ */
      .it-dots {
        display: inline-grid;
        grid-template-columns: repeat(3, 8px);
        grid-template-rows: repeat(4, 8px);
        gap: 4px;
      }
      .it-dots span:nth-child(4n+1) { background: var(--it-orange); }
      .it-dots span:nth-child(4n+2) { background: var(--it-green); }
      .it-dots span:nth-child(4n+3) { background: var(--it-cyan); }
      .it-dots span:nth-child(4n+4) { background: var(--it-yellow); }
      .it-dots span {
        border-radius: 50%;
        animation: dot-cascade .6s var(--ease-spring) both;
      }

      /* ══════════════════════════════════════════════════════════════════
         SEZIONE W — SCROLL-TO-TOP, BADGE, MISC
         ══════════════════════════════════════════════════════════════════ */
      [class*="scroll-top"], [id*="scroll-top"] {
        background: var(--grad-brand) !important;
        border-radius: 50% !important;
        box-shadow: var(--shadow-green) !important;
      }
      .badge-brand {
        background: var(--grad-brand);
        color: #fff;
        border-radius: var(--r-full);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .075em;
        padding: .25rem .75rem;
        box-shadow: 0 2px 8px rgba(0,208,132,.4);
      }
      .badge-neon {
        background: var(--mb-yellow);
        color: var(--mb-notte);
        border-radius: var(--r-full);
        font-weight: 800;
        padding: .2rem .7rem;
      }

      /* Section divider */
      .section-divider {
        width: 96px; height: 5px;
        background: var(--grad-vivid);
        border-radius: var(--r-full);
        box-shadow: 0 3px 12px rgba(0,208,132,.4);
        margin: 0 auto;
      }

      /* ══════════════════════════════════════════════════════════════════
         SEZIONE X — SMOOTH SCROLL + MICRO-INTERACTIONS
         ══════════════════════════════════════════════════════════════════ */
      /* Links */
      a:not([class*="bg-"]):not(button) {
        color: var(--mb-green);
        text-decoration: none;
        background-image: linear-gradient(var(--mb-green), var(--mb-green));
        background-size: 0% 2px;
        background-position: 0% 100%;
        background-repeat: no-repeat;
        transition: background-size .35s var(--ease-out), color .25s;
      }
      a:not([class*="bg-"]):not(button):hover {
        background-size: 100% 2px;
        color: var(--mb-green-dark);
      }

      /* Input focus glow */
      input:focus, textarea:focus, select:focus {
        border-color: var(--mb-green) !important;
        box-shadow: 0 0 0 3px rgba(0,208,132,.15), 0 0 16px rgba(0,208,132,.08) !important;
        transition: border-color .25s, box-shadow .25s !important;
      }

      /* Smooth section padding transitions */
      section, [class*="section"] {
        position: relative;
        z-index: 2;
      }

      /* Subtle hover glow on images (escludi Leaflet) */
      img:not([class*="logo"]):not([class*="avatar"]):not(.leaflet-tile):not(.leaflet-marker-icon):not(.leaflet-marker-shadow) {
        transition: filter .4s var(--ease-out), transform .8s var(--ease-out) !important;
      }

      /* Selection color */
      ::selection {
        background-color: rgba(0,208,132,.25);
        color: #1A1A2E;
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--mb-surface);
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #00D084, #00B4D8);
        border-radius: var(--r-full);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #00A86B, #0090AC);
      }
    </style>
  </head>

  <body class="bg-cream-50 text-stone-800 font-body antialiased">

    <!-- Scroll progress bar -->
    <div id="mb-scroll-bar" role="progressbar" aria-hidden="true"></div>

    <!-- Loading screen -->
    <div id="mb-loader" role="status" aria-label="Caricamento MetaBorghi">
      <div class="loader-ring" aria-hidden="true"></div>
      <div class="loader-ring" aria-hidden="true"></div>
      <div class="loader-ring" aria-hidden="true"></div>
      <div class="loader-swirl" aria-hidden="true"><img src="/logo%20png.png" alt="" width="60" height="60"></div>
      <div class="loader-logo" style="margin-top:1.5rem">MetaBorghi</div>
      <div class="loader-sub">Alta Irpinia · Campania · InnTour</div>
    </div>

    <!-- React SPA mount -->
    <div id="root"></div>

    <script>
      (function () {
        'use strict';

        /* ═══════════════════════════════════════════════════════════
           SCROLL PROGRESS BAR
           ═══════════════════════════════════════════════════════════ */
        var bar = document.getElementById('mb-scroll-bar');
        var ticking = false;
        window.addEventListener('scroll', function () {
          if (!ticking) {
            requestAnimationFrame(function () {
              var st = window.scrollY;
              var dh = document.documentElement.scrollHeight - window.innerHeight;
              if (bar && dh > 0) bar.style.width = ((st / dh) * 100) + '%';
              ticking = false;
            });
            ticking = true;
          }
        }, { passive: true });

        /* ═══════════════════════════════════════════════════════════
           LOADING SCREEN
           ═══════════════════════════════════════════════════════════ */
        var loader = document.getElementById('mb-loader');
        var loaderHidden = false;
        function hideLoader() {
          if (loaderHidden) return;
          loaderHidden = true;
          setTimeout(function () { if (loader) loader.classList.add('hidden'); }, 350);
        }
        var loadObserver = new MutationObserver(function () {
          var r = document.getElementById('root');
          if (r && r.children.length > 0) { hideLoader(); loadObserver.disconnect(); }
        });
        setTimeout(function () {
          var r = document.getElementById('root');
          if (r) loadObserver.observe(r, { childList: true, subtree: false });
        }, 0);
        setTimeout(hideLoader, 6000);

        /* ═══════════════════════════════════════════════════════════
           NAVBAR SCROLL EFFECT (transparency → glass on scroll)
           ═══════════════════════════════════════════════════════════ */
        function initNavbarEffect() {
          var navTicking = false;
          window.addEventListener('scroll', function () {
            if (!navTicking) {
              requestAnimationFrame(function () {
                var navEl = document.querySelector('header, nav, [class*="navbar"], [class*="fixed"][class*="top-0"]');
                if (navEl) {
                  if (window.scrollY > 60) {
                    navEl.style.background = 'rgba(250,250,248,.85)';
                    navEl.style.boxShadow = '0 4px 20px rgba(0,0,0,.08)';
                  } else {
                    navEl.style.background = 'rgba(250,250,248,.4)';
                    navEl.style.boxShadow = 'none';
                  }
                }
                navTicking = false;
              });
              navTicking = true;
            }
          }, { passive: true });
        }

        /* ═══════════════════════════════════════════════════════════
           COUNTER ANIMATION (numeri che crescono)
           ═══════════════════════════════════════════════════════════ */
        function initCounterAnimation() {
          var counters = document.querySelectorAll('[class*="stat"] [class*="text-4xl"], [class*="stat"] [class*="text-5xl"], [class*="stat"] [class*="text-3xl"]');
          if (!counters.length) return;

          var counterIO = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                var el = entry.target;
                var text = el.textContent.trim();
                var num = parseInt(text.replace(/[^\d]/g, ''));
                if (isNaN(num) || num === 0) return;

                var suffix = text.replace(/[\d.,]/g, '');
                var duration = 2000;
                var start = performance.now();

                function step(now) {
                  var progress = Math.min((now - start) / duration, 1);
                  var eased = 1 - Math.pow(1 - progress, 3);
                  var current = Math.floor(eased * num);
                  el.textContent = current.toLocaleString('it-IT') + suffix;
                  if (progress < 1) requestAnimationFrame(step);
                }
                requestAnimationFrame(step);
                counterIO.unobserve(el);
              }
            });
          }, { threshold: 0.5 });

          counters.forEach(function (el) { counterIO.observe(el); });
        }

        /* ═══════════════════════════════════════════════════════════
           SECTION PARALLAX (leggero spostamento Y al scroll)
           ═══════════════════════════════════════════════════════════ */

        /* ═══════════════════════════════════════════════════════════
           RE-APPLY ON ROUTE CHANGE (SPA)
           ═══════════════════════════════════════════════════════════ */
        var routeDebounce = null;
        var routeObserver = new MutationObserver(function () {
          clearTimeout(routeDebounce);
          routeDebounce = setTimeout(function () {
            initCounterAnimation();
          }, 150);
        });

        /* ═══════════════════════════════════════════════════════════
           BOOTSTRAP
           ═══════════════════════════════════════════════════════════ */
        function bootstrap() {
          initNavbarEffect();
          initCounterAnimation();
          /* Osserva future mutazioni del DOM per SPA routing */
          var root = document.getElementById('root');
          if (root) routeObserver.observe(root, { childList: true, subtree: true });

          /* Smooth scroll polyfill per anchor links */
          document.addEventListener('click', function (e) {
            var link = e.target.closest('a[href^="#"]');
            if (link) {
              var target = document.querySelector(link.getAttribute('href'));
              if (target) {
                e.preventDefault();
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
              }
            }
          });
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', bootstrap);
        } else {
          setTimeout(bootstrap, 400);
        }
      })();
    </script>
  </body>
</html>
